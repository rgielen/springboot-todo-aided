name: CI

on:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - name: Install Playwright browsers
        run: ./mvnw exec:java -D"exec.mainClass=com.microsoft.playwright.CLI" -D"exec.args=install --with-deps chromium" -D"exec.classpathScope=test"

      - run: ./mvnw clean install
